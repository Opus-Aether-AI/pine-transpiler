name: Pine Transpiler CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gate (fast path, runs on both Node versions) ─────────────────
  quality:
    name: Typecheck · Lint · Build (${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build (dual ESM + CJS)
        run: pnpm build

  # ── Tests + Coverage (Node 20, runs after quality) ───────────────────────
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Print coverage summary
        if: always()
        run: cat coverage/coverage-summary.json 2>/dev/null || echo "No coverage summary found"
