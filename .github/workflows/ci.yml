name: Pine Transpiler CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Type Check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Tests
        run: bun test tests/

      - name: Run Corpus
        run: bun run corpus

      - name: Run Corpus Strict Audit
        run: bun run corpus:strict

      - name: Run Indicator Matrix
        run: bun run corpus:matrix

      - name: Run Corpus Gate
        run: bun run corpus:gate

      - name: Run Chart Safety Gate
        run: bun run chart:safety
