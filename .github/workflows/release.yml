name: release

# Triggered when release-please pushes a v*.*.* tag (or manually via
# workflow_dispatch). Builds, tests, then publishes to npm + GitHub
# Packages with provenance attestation.
#
# npm auth uses OIDC Trusted Publishers — no NPM_TOKEN secret. One-time
# setup on npmjs.com is documented in docs/RELEASING.md.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit SHA to publish (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write     # OIDC token for npm provenance
  packages: write     # publish to GitHub Packages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
      url: https://www.npmjs.com/package/@opus-aether-ai/pine-transpiler

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION from tag $GITHUB_REF_NAME"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test tests/

      - name: Differential parity
        run: bun run corpus:differential

      - name: Visual parity
        run: bun run corpus:visual

      - name: Corpus gate
        run: bun run corpus:gate

      - name: Chart safety gate
        run: bun run chart:safety

      - name: Build
        run: bun run build

      # ─── npm public registry (OIDC trusted publisher) ─────────────────
      - name: Set up Node for npmjs.com
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts

      # ─── GitHub Packages (GITHUB_TOKEN) ───────────────────────────────
      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opus-aether-ai'

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
