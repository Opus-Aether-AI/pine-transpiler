name: release (manual fallback)

# Workflow_dispatch-only fallback for manually publishing a specific tag.
#
# Normal releases flow through release-please.yml on push to main:
# release-please opens a Release PR, you merge it, and the same workflow
# run continues into publish steps. This workflow exists for edge cases
# where you need to re-run publish from an existing tag — e.g. a publish
# failed mid-flight (one registry up, one down), or you need to republish
# after fixing infrastructure.
#
# Usage:
#   gh workflow run release.yml \
#     --repo Opus-Aether-AI/pine-transpiler \
#     --ref main \
#     --field ref=v0.5.0
#
# See docs/RELEASING.md.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit SHA to publish (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write     # OIDC token for npm provenance
  packages: write     # publish to GitHub Packages

concurrency:
  group: release-manual-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
      url: https://www.npmjs.com/package/@opus-aether-ai/pine-transpiler

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify ref matches package.json version
        run: |
          INPUT_REF="${{ inputs.ref }}"
          INPUT_VERSION="${INPUT_REF#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Ref ${INPUT_REF} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Publishing version ${PKG_VERSION} from ref ${INPUT_REF}"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test tests/

      - name: Corpus gate
        run: bun run corpus:gate

      - name: Chart safety gate
        run: bun run chart:safety

      - name: Build
        run: bun run build

      # ─── npm public registry (OIDC trusted publisher) ─────────────────
      - name: Set up Node for npmjs.com
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts

      # ─── GitHub Packages (GITHUB_TOKEN) ───────────────────────────────
      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opus-aether-ai'

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
