name: release-please

# Single-workflow release pipeline with auto-merge:
#  1. The `release-please` job runs on every push to main. It either creates
#     or updates the open "Release PR" (and flags it for auto-merge), or —
#     when the just-merged commit IS the Release PR — creates a new tag +
#     GitHub Release.
#  2. The `publish` job runs only when a release was created in the same
#     run. It builds + verifies, then publishes to npm (OIDC) and GitHub
#     Packages.
#
# Auto-merge: every Release PR opened by release-please is immediately
# flagged with GitHub's native auto-merge. Once branch-protection checks
# pass on that PR, GitHub merges it automatically. End result: a single
# feature PR merge to main triggers a full publish without any further
# clicks.
#
# The publish step lives in this workflow (not in release.yml) so the
# tag created by release-please triggers the publish in the same workflow
# run. GitHub deliberately does NOT fire downstream `push: tags:` workflows
# for events created via the default GITHUB_TOKEN, so cross-workflow
# triggers don't work — single-workflow is the supported pattern.
#
# release.yml is kept as a workflow_dispatch-only escape hatch for
# manually re-publishing a specific tag (e.g. if a publish failed
# mid-flight and needs to be re-run).
#
# See docs/RELEASING.md for the full flow.

on:
  push:
    branches:
      - main

permissions:
  contents: write       # release-please creates tags + releases
  pull-requests: write  # release-please updates the Release PR
  id-token: write       # OIDC token for npm provenance
  packages: write       # publish to GitHub Packages

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # When release-please opens or updates a Release PR, flag it for
      # GitHub-native auto-merge so it lands the moment branch-protection
      # checks pass. The default GITHUB_TOKEN has the `pull-requests:
      # write` permission granted at the workflow level above.
      #
      # Requires the repository to have `Allow auto-merge` enabled in
      # Settings → General → Pull Requests. If it's not, the gh CLI will
      # exit non-zero with a clear error.
      - name: Enable auto-merge on Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER="$(printf '%s' "${PR_JSON}" | jq -r '.number // empty')"
          if [ -z "${PR_NUMBER}" ]; then
            echo "::error::release-please returned PR output without a number"
            exit 1
          fi

          echo "Enabling auto-merge on Release PR #${PR_NUMBER}"
          gh pr merge "${PR_NUMBER}" --repo "${REPO}" --auto --squash

  publish:
    name: Build, verify, publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
      url: https://www.npmjs.com/package/@opus-aether-ai/pine-transpiler

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${{ needs.release-please.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test tests/

      - name: Differential parity
        run: bun run corpus:differential

      - name: Visual parity
        run: bun run corpus:visual

      - name: Corpus gate
        run: bun run corpus:gate

      - name: Chart safety gate
        run: bun run chart:safety

      - name: Build
        run: bun run build

      # ─── npm public registry (OIDC trusted publisher) ─────────────────
      - name: Set up Node for npmjs.com
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts

      # ─── GitHub Packages (GITHUB_TOKEN) ───────────────────────────────
      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opus-aether-ai'

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
