version: 2

updates:
  # JavaScript/TypeScript dev dependencies (no runtime deps by design)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      # Batch minor/patch bumps to reduce PR noise; majors stay individual
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in .github/workflows/ (only ~2 actions today;
  # limit kept low to match the actual surface)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
